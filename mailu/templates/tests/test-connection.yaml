{{- if .Values.ingress.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "mailu.fullname" . }}-test-connection"
  labels: {{- include "common.labels.standard" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['/bin/sh']
      args:
        - '-c'
        - |
          {{- range .Values.hostnames }}
          wget -S --header "Host: {{ . }}" 'https://192.168.0.100'
          wget -S --header "Host: {{ . }}" 'https://192.168.0.101'
          {{- end }}
  restartPolicy: Never
{{- end }}
