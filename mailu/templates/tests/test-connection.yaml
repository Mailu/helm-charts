{{- if .Values.ingress.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "mailu.fullname" . }}-test-connection"
  labels: {{- include "common.labels.standard" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
  {{- range .Values.hostnames }}
    - name: wget-{{ . }}
      image: busybox
      command: ['wget']
      args: ['-S', 'https://{{ . }}']
  {{- end }}
  restartPolicy: Never
{{- end }}
